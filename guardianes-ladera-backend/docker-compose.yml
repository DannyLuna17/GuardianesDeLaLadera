services:
  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: guardianes_ladera
      POSTGRES_USER: guardianes
      POSTGRES_PASSWORD: guardianes
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guardianes -d guardianes_ladera"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: docker
      DATABASE_URL: postgresql+psycopg://guardianes:guardianes@postgres:5432/guardianes_ladera
      RUN_DB_MIGRATIONS_ON_STARTUP: "false"
    command: uv run alembic upgrade head
    restart: "no"

  runtime-bootstrap:
    build:
      context: .
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      APP_ENV: docker
      REAL_DATA_ONLY: "true"
      DATABASE_URL: postgresql+psycopg://guardianes:guardianes@postgres:5432/guardianes_ladera
      RUN_DB_MIGRATIONS_ON_STARTUP: "false"
      LOG_LEVEL: INFO
      SEED_DEMO_DATA: "false"
      ENABLE_SCHEDULER: "false"
      MODEL_VERSION: trained-spatial-seed-v1
      ACTIVE_MODEL_MANIFEST_PATH: ${ACTIVE_MODEL_MANIFEST_PATH:-}
      MODEL_EVALUATIONS_PATH: ${MODEL_EVALUATIONS_PATH:-}
      MODEL_SELECTION_RUNS_PATH: ${MODEL_SELECTION_RUNS_PATH:-}
      MODEL_DRIFT_REPORTS_PATH: ${MODEL_DRIFT_REPORTS_PATH:-}
      MODEL_SHADOW_RUNS_PATH: ${MODEL_SHADOW_RUNS_PATH:-}
      MODEL_PROMOTION_MIN_VALIDATION_RMSE_IMPROVEMENT: ${MODEL_PROMOTION_MIN_VALIDATION_RMSE_IMPROVEMENT:-0.0}
      MODEL_PROMOTION_MIN_VALIDATION_ROWS: ${MODEL_PROMOTION_MIN_VALIDATION_ROWS:-1}
